dbcall:
    config:
        name: 'dbcall'
        __dbcall_image_path: 'docker-hub.middleware.biz/gitcall/dunder-dbcall:latest'
        __dbcall_liveness_port: 11234
        __dbcall_readiness_port: 12345
        liveness_port: 11234
        readiness_port: 12345
        use_prometheus_metrics: true
        logger: 
            level: debug
            transports: [ console ]
        api: 
            server:
                host: 0.0.0.0
                port: 7777
        services_pimp: 
            host: 127.0.0.1
            port: 10000
            timeoutMs: 5000
        database:
            host: 127.0.0.1
            port: 5432
            username: postgres
            password: dbpass
            database: dbcall
            timeoutMs: 5000
            ssl: false
            max_open_conns_per_db: 100
        prom_api: 'http://prom-api'
        query_consumer: 
            host: '127.0.0.1'
            port: 5672
            username: 'rmquser'
            password: 'rmqpass'
            vhost: '/'
            prefetch: 50
            queue_name: 'dbcall-query'
        query_reply_publisher:
            host: '127.0.0.1'
            port: 5672
            username: 'rmquser'
            password: 'rmqpass'
            vhost: '/'
        prometheus:
            enabled: true
            type: "scrape"
            metrics_host: "0.0.0.0"
            metrics_port: 9101
            not_scraped_check_period_sec: 120
    helm:
        # [REQUIRED]: object.
        image_pull_policy: 'Always'
        image_pull_secrets: []
        max_replicas: 1
        min_replicas: 1

release:
    name: 'dbcall_release'
    helm:
        enabled: true
        chart:
            version: '1.2.3'
            description: 'aDescription'
        context: ''
        namespace: 'aNamespace'
        release: 'aRelease'
        deploy: [dbcall]
    require:
        dbcall: 'aVersion'
    repositories:
        dbcall:
            source: 'local'
            local: { path: '../../' }